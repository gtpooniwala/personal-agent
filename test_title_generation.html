<!DOCTYPE html>
<html>
<head>
    <title>Title Generation Test</title>
</head>
<body>
    <h1>Title Generation Test</h1>
    <div id="status"></div>
    <button onclick="testTitleGeneration()">Test Title Generation</button>
    
    <script>
        const API_BASE = 'http://127.0.0.1:8000/api/v1';
        
        async function apiCall(endpoint, options = {}) {
            const response = await fetch(`${API_BASE}${endpoint}`, {
                headers: {
                    'Content-Type': 'application/json',
                    ...options.headers
                },
                ...options
            });
            
            if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
            }
            
            return await response.json();
        }
        
        async function testTitleGeneration() {
            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML = 'Testing title generation...<br>';
            
            try {
                // 1. Create a new conversation
                statusDiv.innerHTML += 'Creating new conversation...<br>';
                const conversation = await apiCall('/conversations', {
                    method: 'POST',
                    body: JSON.stringify({title: 'Test Conversation'})
                });
                
                const conversationId = conversation.id;
                statusDiv.innerHTML += `Created conversation: ${conversationId}<br>`;
                
                // 2. Send messages
                const messages = [
                    "What is machine learning?",
                    "Can you explain neural networks?", 
                    "What are some practical applications?"
                ];
                
                for (let i = 0; i < messages.length; i++) {
                    statusDiv.innerHTML += `Sending message ${i + 1}: "${messages[i]}"<br>`;
                    const response = await apiCall('/chat', {
                        method: 'POST',
                        body: JSON.stringify({
                            message: messages[i],
                            conversation_id: conversationId
                        })
                    });
                    statusDiv.innerHTML += `Response received<br>`;
                }
                
                // 3. Test title generation
                statusDiv.innerHTML += 'Generating title...<br>';
                const titleResponse = await apiCall(`/conversations/${conversationId}/generate-title`, {
                    method: 'POST'
                });
                
                statusDiv.innerHTML += `Generated title: "${titleResponse.title}"<br>`;
                
                // 4. Verify title was saved
                statusDiv.innerHTML += 'Verifying title was saved...<br>';
                const conversations = await apiCall('/conversations');
                const updatedConv = conversations.find(c => c.id === conversationId);
                
                if (updatedConv && updatedConv.title === titleResponse.title) {
                    statusDiv.innerHTML += `✅ SUCCESS: Title was updated to "${updatedConv.title}"<br>`;
                } else {
                    statusDiv.innerHTML += `❌ FAILED: Title was not updated. Current title: "${updatedConv?.title}"<br>`;
                }
                
            } catch (error) {
                statusDiv.innerHTML += `❌ ERROR: ${error.message}<br>`;
                console.error(error);
            }
        }
    </script>
</body>
</html>
