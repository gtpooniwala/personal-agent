interface:
  display_name: "Repo Merge PR Flow"
  short_description: "Resolve comments, run cubic, merge, release slot"
  default_prompt: "Use $repo-merge-pr-flow to merge a ready PR only after the worktree is clean, `cubic review --base main` has no remaining issues, and PR comments are addressed explicitly with $gh-address-comments. Merge with `gh pr merge --squash` without local branch deletion, and if this is a managed slot, run `scripts/release-slot.sh --slot \"$slot_id\"` outside the sandbox but still from a checkout of this same repo, because slot release relies on `git rev-parse` and writes shared state. If there are in-scope uncommitted changes, switch to $repo-commit-pr-flow and stop for user input."
