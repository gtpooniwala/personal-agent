<!DOCTYPE html>
<html>
<head>
    <title>Live Time Formatting Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-item { margin: 10px 0; padding: 10px; background: #f5f5f5; border-radius: 5px; }
        .timestamp { font-weight: bold; color: #007acc; }
    </style>
</head>
<body>
    <h1>Live Time Formatting Test</h1>
    <p>This tests the actual formatDate function that should be working in the chat interface.</p>
    
    <div id="test-results"></div>
    <button onclick="runTests()">Refresh Tests</button>

    <script>
        function formatDate(dateString) {
            const date = new Date(dateString);
            const now = new Date();
            const diff = now - date;
            
            // Calculate time units
            const seconds = Math.floor(diff / 1000);
            const minutes = Math.floor(diff / 60000);
            const hours = Math.floor(diff / 3600000);
            const days = Math.floor(diff / 86400000);
            const weeks = Math.floor(days / 7);
            const months = Math.floor(days / 30);
            const years = Math.floor(days / 365);

            // Debug info
            console.log('formatDate debug:', {
                input: dateString,
                diff: diff,
                seconds: seconds,
                minutes: minutes,
                hours: hours,
                days: days
            });

            // Smart unit selection
            if (seconds < 30) return 'Just now';
            if (seconds < 60) return `${seconds}s ago`;
            if (minutes < 60) return `${minutes}m ago`;
            if (hours < 24) return `${hours}h ago`;
            if (days < 7) return `${days} day${days === 1 ? '' : 's'} ago`;
            if (weeks < 4) return `${weeks} week${weeks === 1 ? '' : 's'} ago`;
            if (months < 12) return `${months} month${months === 1 ? '' : 's'} ago`;
            if (years >= 1) return `${years} year${years === 1 ? '' : 's'} ago`;
            
            // Fallback to formatted date for edge cases
            return date.toLocaleDateString();
        }

        function runTests() {
            const now = new Date();
            const testCases = [
                { time: new Date(now.getTime() - 15 * 1000), label: '15 seconds ago' },
                { time: new Date(now.getTime() - 45 * 1000), label: '45 seconds ago' },
                { time: new Date(now.getTime() - 2 * 60 * 1000), label: '2 minutes ago' },
                { time: new Date(now.getTime() - 45 * 60 * 1000), label: '45 minutes ago' },
                { time: new Date(now.getTime() - 2 * 60 * 60 * 1000), label: '2 hours ago' },
                { time: new Date(now.getTime() - 12 * 60 * 60 * 1000), label: '12 hours ago' },
                { time: new Date(now.getTime() - 2 * 24 * 60 * 60 * 1000), label: '2 days ago' },
                { time: new Date(now.getTime() - 5 * 24 * 60 * 60 * 1000), label: '5 days ago' },
                { time: new Date(now.getTime() - 10 * 24 * 60 * 60 * 1000), label: '10 days ago (1.4 weeks)' },
                { time: new Date(now.getTime() - 3 * 7 * 24 * 60 * 60 * 1000), label: '3 weeks ago' },
                { time: new Date(now.getTime() - 2 * 30 * 24 * 60 * 60 * 1000), label: '2 months ago' },
                { time: new Date(now.getTime() - 380 * 24 * 60 * 60 * 1000), label: '13 months ago (1+ year)' }
            ];

            let html = '<h2>Test Results (updated at ' + new Date().toLocaleTimeString() + '):</h2>';
            
            testCases.forEach((testCase, index) => {
                const formatted = formatDate(testCase.time.toISOString());
                html += `
                    <div class="test-item">
                        <strong>Test ${index + 1}:</strong> ${testCase.label}<br>
                        <strong>Timestamp:</strong> ${testCase.time.toISOString()}<br>
                        <strong>Formatted:</strong> <span class="timestamp">${formatted}</span>
                    </div>
                `;
            });

            document.getElementById('test-results').innerHTML = html;
        }

        // Run tests on load
        window.onload = runTests;
    </script>
</body>
</html>
