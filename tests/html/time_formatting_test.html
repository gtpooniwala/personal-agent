<!DOCTYPE html>
<html>
<head>
    <title>Time Formatting Test</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 20px; }
        .test-case { margin: 10px 0; padding: 10px; background: #f5f5f5; border-radius: 5px; }
        .test-case strong { color: #2c3e50; }
        .result { color: #27ae60; font-weight: 500; }
    </style>
</head>
<body>
    <h1>Smart Time Formatting Test</h1>
    <p>Testing the improved time display with various intervals:</p>
    
    <div id="test-results"></div>

    <script>
        function formatDate(dateString) {
            const date = new Date(dateString);
            const now = new Date();
            const diff = now - date;
            
            // Calculate time units
            const seconds = Math.floor(diff / 1000);
            const minutes = Math.floor(diff / 60000);
            const hours = Math.floor(diff / 3600000);
            const days = Math.floor(diff / 86400000);
            const weeks = Math.floor(days / 7);
            const months = Math.floor(days / 30);
            const years = Math.floor(days / 365);

            // Smart unit selection
            if (seconds < 30) return 'Just now';
            if (seconds < 60) return `${seconds}s ago`;
            if (minutes < 60) return `${minutes}m ago`;
            if (hours < 24) return `${hours}h ago`;
            if (days < 7) return `${days} day${days === 1 ? '' : 's'} ago`;
            if (weeks < 4) return `${weeks} week${weeks === 1 ? '' : 's'} ago`;
            if (months < 12) return `${months} month${months === 1 ? '' : 's'} ago`;
            if (years >= 1) return `${years} year${years === 1 ? '' : 's'} ago`;
            
            // Fallback to formatted date for edge cases
            return date.toLocaleDateString();
        }

        function runTests() {
            const now = new Date();
            const testCases = [
                { label: "15 seconds ago", date: new Date(now - 15 * 1000) },
                { label: "45 seconds ago", date: new Date(now - 45 * 1000) },
                { label: "2 minutes ago", date: new Date(now - 2 * 60 * 1000) },
                { label: "30 minutes ago", date: new Date(now - 30 * 60 * 1000) },
                { label: "2 hours ago", date: new Date(now - 2 * 60 * 60 * 1000) },
                { label: "1 day ago", date: new Date(now - 1 * 24 * 60 * 60 * 1000) },
                { label: "3 days ago", date: new Date(now - 3 * 24 * 60 * 60 * 1000) },
                { label: "1 week ago", date: new Date(now - 7 * 24 * 60 * 60 * 1000) },
                { label: "2 weeks ago", date: new Date(now - 14 * 24 * 60 * 60 * 1000) },
                { label: "1 month ago", date: new Date(now - 30 * 24 * 60 * 60 * 1000) },
                { label: "3 months ago", date: new Date(now - 90 * 24 * 60 * 60 * 1000) },
                { label: "1 year ago", date: new Date(now - 365 * 24 * 60 * 60 * 1000) },
                { label: "2 years ago", date: new Date(now - 2 * 365 * 24 * 60 * 60 * 1000) }
            ];

            const resultsDiv = document.getElementById('test-results');
            
            testCases.forEach(testCase => {
                const result = formatDate(testCase.date.toISOString());
                resultsDiv.innerHTML += `
                    <div class="test-case">
                        <strong>${testCase.label}:</strong> 
                        <span class="result">${result}</span>
                    </div>
                `;
            });
        }

        // Run tests when page loads
        window.onload = runTests;
    </script>
</body>
</html>
