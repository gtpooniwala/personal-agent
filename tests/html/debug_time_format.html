<!DOCTYPE html>
<html>
<head>
    <title>Debug Time Formatting</title>
</head>
<body>
    <h1>Time Formatting Debug</h1>
    <div id="test-results"></div>

    <script>
        function formatDate(dateString) {
            const date = new Date(dateString);
            const now = new Date();
            const diff = now - date;
            
            // Calculate time units
            const seconds = Math.floor(diff / 1000);
            const minutes = Math.floor(diff / 60000);
            const hours = Math.floor(diff / 3600000);
            const days = Math.floor(diff / 86400000);
            const weeks = Math.floor(days / 7);
            const months = Math.floor(days / 30);
            const years = Math.floor(days / 365);

            // Smart unit selection
            if (seconds < 30) return 'Just now';
            if (seconds < 60) return `${seconds}s ago`;
            if (minutes < 60) return `${minutes}m ago`;
            if (hours < 24) return `${hours}h ago`;
            if (days < 7) return `${days} day${days === 1 ? '' : 's'} ago`;
            if (weeks < 4) return `${weeks} week${weeks === 1 ? '' : 's'} ago`;
            if (months < 12) return `${months} month${months === 1 ? '' : 's'} ago`;
            if (years >= 1) return `${years} year${years === 1 ? '' : 's'} ago`;
            
            // Fallback to formatted date for edge cases
            return date.toLocaleDateString();
        }

        // Test various timestamps
        const now = new Date();
        const testTimes = [
            new Date(now.getTime() - 15 * 1000), // 15 seconds ago
            new Date(now.getTime() - 45 * 1000), // 45 seconds ago
            new Date(now.getTime() - 5 * 60 * 1000), // 5 minutes ago
            new Date(now.getTime() - 2 * 60 * 60 * 1000), // 2 hours ago
            new Date(now.getTime() - 3 * 24 * 60 * 60 * 1000), // 3 days ago
            new Date(now.getTime() - 2 * 7 * 24 * 60 * 60 * 1000), // 2 weeks ago
            new Date(now.getTime() - 3 * 30 * 24 * 60 * 60 * 1000), // 3 months ago
        ];

        let results = '<h2>Test Results:</h2>';
        testTimes.forEach((time, index) => {
            const formatted = formatDate(time.toISOString());
            results += `<p>Test ${index + 1}: ${time.toLocaleString()} → <strong>${formatted}</strong></p>`;
        });

        document.getElementById('test-results').innerHTML = results;
    </script>
</body>
</html>
