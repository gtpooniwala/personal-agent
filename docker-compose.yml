services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-personal_agent}
      POSTGRES_USER: ${POSTGRES_USER:-personal_agent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-personal_agent}
    ports:
      - "${DOCKER_POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-personal_agent} -d ${POSTGRES_DB:-personal_agent}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  personal-agent:
    init: true
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${DOCKER_API_PORT:-8001}:8000"
    env_file:
      - .env
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GMAIL_CREDENTIALS_PATH: ${GMAIL_CREDENTIALS_PATH:-/app/data/gmail/client_secret.json}
      GMAIL_TOKEN_PATH: ${GMAIL_TOKEN_PATH:-/app/data/gmail/token.pickle}
      DATABASE_URL: ${DATABASE_URL_DOCKER:-postgresql+psycopg://personal_agent:personal_agent@postgres:5432/personal_agent}
      HOST: 0.0.0.0
      PORT: ${PORT:-8000}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:${DOCKER_FRONTEND_PORT:-3001},http://127.0.0.1:${DOCKER_FRONTEND_PORT:-3001}}
      FRONTEND_URL: ${DOCKER_FRONTEND_URL:-http://localhost:${DOCKER_FRONTEND_PORT:-3001}}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
  frontend:
    init: true
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${DOCKER_NEXT_PUBLIC_API_BASE_URL:-http://localhost:${DOCKER_API_PORT:-8001}/api/v1}
    ports:
      - "${DOCKER_FRONTEND_PORT:-3001}:3000"
    environment:
      - PORT=3000
      - NEXT_PUBLIC_API_BASE_URL=${DOCKER_NEXT_PUBLIC_API_BASE_URL:-http://localhost:${DOCKER_API_PORT:-8001}/api/v1}
      - NEXT_PUBLIC_RUNTIME_API_BASE_URL=${DOCKER_NEXT_PUBLIC_RUNTIME_API_BASE_URL:-http://localhost:${DOCKER_API_PORT:-8001}}
    depends_on:
      personal-agent:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  postgres_data:
