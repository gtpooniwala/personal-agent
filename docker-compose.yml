services:
  postgres:
    image: postgres:16
    command: ["postgres", "-p", "${DOCKER_POSTGRES_PORT:-5433}"]
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-personal_agent}
      POSTGRES_USER: ${POSTGRES_USER:-personal_agent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-personal_agent}
    ports:
      - "${DOCKER_POSTGRES_PORT:-5433}:${DOCKER_POSTGRES_PORT:-5433}"
    volumes:
      - type: bind
        source: ${DOCKER_POSTGRES_DATA_DIR:-${HOME}/.personal-agent/postgres}
        target: /var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -p ${DOCKER_POSTGRES_PORT:-5433} -U ${POSTGRES_USER:-personal_agent} -d ${POSTGRES_DB:-personal_agent}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  personal-agent:
    init: true
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${DOCKER_API_PORT:-8001}:${DOCKER_API_PORT:-8001}"
    env_file:
      - .env
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DATABASE_URL: ${DATABASE_URL_DOCKER:-postgresql+psycopg://personal_agent:personal_agent@postgres:${DOCKER_POSTGRES_PORT:-5433}/personal_agent}
      HOST: 0.0.0.0
      PORT: ${DOCKER_API_PORT:-8001}
      AGENT_API_KEY: ${AGENT_API_KEY:-}
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET:-}
      GOOGLE_OAUTH_REDIRECT_URI: ${GOOGLE_OAUTH_REDIRECT_URI:-http://localhost:${DOCKER_API_PORT:-8001}/api/v1/gmail/callback}
      CREDENTIALS_MASTER_KEY: ${CREDENTIALS_MASTER_KEY:-}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:${DOCKER_FRONTEND_PORT:-3001},http://127.0.0.1:${DOCKER_FRONTEND_PORT:-3001}}
      FRONTEND_URL: ${DOCKER_FRONTEND_URL:-http://localhost:${DOCKER_FRONTEND_PORT:-3001}}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import os, urllib.request; port = os.environ.get('PORT', '8001').strip(); token = os.environ.get('AGENT_API_KEY', '').strip(); request = urllib.request.Request(f'http://127.0.0.1:{port}/api/v1/health', headers={'Authorization': f'Bearer {token}'} if token else {}); urllib.request.urlopen(request, timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
  frontend:
    init: true
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${DOCKER_FRONTEND_PORT:-3001}:${DOCKER_FRONTEND_PORT:-3001}"
    environment:
      - PORT=${DOCKER_FRONTEND_PORT:-3001}
      - API_BASE_URL=${DOCKER_API_BASE_URL:-http://personal-agent:${DOCKER_API_PORT:-8001}}
      - AGENT_API_KEY=${AGENT_API_KEY:-local-dev-proxy-token}
    depends_on:
      personal-agent:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:${DOCKER_FRONTEND_PORT:-3001}/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
