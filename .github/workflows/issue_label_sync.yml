name: Issue Label Sync

on:
  issues:
    types: [opened, edited, reopened]

permissions:
  contents: read
  issues: write

jobs:
  sync-issue-labels:
    name: sync-issue-labels
    runs-on: ubuntu-latest
    steps:
      - name: Sync managed labels from issue form fields
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const body = (issue.body || "").replace(/\r\n/g, "\n");

            function escapeRegExp(value) {
              return value.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
            }

            function getSection(title) {
              const pattern = new RegExp(`^### ${escapeRegExp(title)}\\n([\\s\\S]*?)(?=\\n### |$)`, "m");
              const match = body.match(pattern);
              return match ? match[1].trim() : "";
            }

            function getSingleValue(title) {
              const section = getSection(title);
              if (!section || section === "_No response_") {
                return null;
              }
              const line = section
                .split("\n")
                .map((entry) => entry.trim())
                .find((entry) => entry.length > 0 && entry !== "_No response_");
              return line || null;
            }

            function getCheckedValues(title) {
              const section = getSection(title);
              if (!section) {
                return [];
              }
              return Array.from(section.matchAll(/^- \[x\] (.+)$/gim), (match) => match[1].trim());
            }

            const managedPrefixes = ["priority:", "size:", "type:", "track:"];
            const currentLabels = issue.labels.map((label) => label.name);

            const desiredLabels = new Set();

            const priority = getSingleValue("Priority");
            const size = getSingleValue("Size");
            const primaryType = getSingleValue("Primary type label");
            const additionalTypes = getCheckedValues("Additional type labels");
            const tracks = getCheckedValues("Track labels");

            const hasManagedFormFields = Boolean(
              priority ||
              size ||
              primaryType ||
              additionalTypes.length > 0 ||
              tracks.length > 0
            );

            if (!hasManagedFormFields) {
              core.info("Issue body does not contain managed issue-form fields. Skipping label sync.");
              return;
            }

            for (const value of [priority, size, primaryType]) {
              if (value) {
                desiredLabels.add(value);
              }
            }

            for (const value of [...additionalTypes, ...tracks]) {
              if (value) {
                desiredLabels.add(value);
              }
            }

            const labelsToRemove = currentLabels.filter((label) =>
              managedPrefixes.some((prefix) => label.startsWith(prefix)) && !desiredLabels.has(label)
            );

            const labelsToAdd = Array.from(desiredLabels).filter((label) => !currentLabels.includes(label));

            if (labelsToRemove.length > 0) {
              await github.rest.issues.removeLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: labelsToRemove,
              });
            }

            if (labelsToAdd.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: labelsToAdd,
              });
            }
