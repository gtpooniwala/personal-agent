name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref_name }}
  cancel-in-progress: true

jobs:
  detect_changes:
    name: detect-changes
    runs-on: ubuntu-latest
    outputs:
      run_backend_tests: ${{ steps.changes.outputs.run_backend_tests }}
      run_frontend_tests: ${{ steps.changes.outputs.run_frontend_tests }}
      run_repo_checks: ${{ steps.changes.outputs.run_repo_checks }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect CI-relevant changes
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run_backend_tests=true" >> "$GITHUB_OUTPUT"
            echo "run_frontend_tests=true" >> "$GITHUB_OUTPUT"
            echo "run_repo_checks=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
          CHANGED="$(git diff --name-only "origin/${{ github.base_ref }}...HEAD")"
          echo "$CHANGED"

          if echo "$CHANGED" | grep -Eq '^(backend/|tests/|scripts/|\.githooks/|Dockerfile|docker-compose\.yml|setup\.sh|start_server\.sh|backend/requirements\.txt|\.github/workflows/)'; then
            echo "run_backend_tests=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_backend_tests=false" >> "$GITHUB_OUTPUT"
          fi

          if echo "$CHANGED" | grep -Eq '^frontend/'; then
            echo "run_frontend_tests=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_frontend_tests=false" >> "$GITHUB_OUTPUT"
          fi

          if echo "$CHANGED" | grep -Eq '^(backend/|frontend/|tests/|scripts/|\.githooks/|Dockerfile|docker-compose\.yml|setup\.sh|start_server\.sh|\.github/workflows/|backend/requirements\.txt)'; then
            echo "run_repo_checks=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_repo_checks=false" >> "$GITHUB_OUTPUT"
          fi

  backend_tests:
    name: backend-tests
    runs-on: ubuntu-latest
    needs: detect_changes
    if: needs.detect_changes.outputs.run_backend_tests == 'true'
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: personal_agent_test
          POSTGRES_USER: personal_agent
          POSTGRES_PASSWORD: personal_agent
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U personal_agent -d personal_agent_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: postgresql+psycopg://personal_agent:personal_agent@localhost:5432/personal_agent_test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run backend unit tests
        run: |
          python tests/run_unit_tests.py

  frontend_tests:
    name: frontend-tests
    runs-on: ubuntu-latest
    needs: detect_changes
    if: needs.detect_changes.outputs.run_frontend_tests == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Run frontend checks
        run: |
          cd frontend
          npm run lint
          npm run test
          npm run build

  repo_checks:
    name: repo-checks
    runs-on: ubuntu-latest
    needs: detect_changes
    if: needs.detect_changes.outputs.run_repo_checks == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run deterministic repository checks
        run: |
          python tests/run_repo_checks.py

  tests-and-repo-checks:
    name: tests-and-repo-checks
    runs-on: ubuntu-latest
    needs:
      - detect_changes
      - backend_tests
      - frontend_tests
      - repo_checks
    if: always()
    steps:
      - name: Validate upstream CI results
        env:
          DETECT_CHANGES_RESULT: ${{ needs.detect_changes.result }}
          BACKEND_RESULT: ${{ needs.backend_tests.result }}
          FRONTEND_RESULT: ${{ needs.frontend_tests.result }}
          REPO_RESULT: ${{ needs.repo_checks.result }}
        run: |
          echo "detect-changes: ${DETECT_CHANGES_RESULT}"
          echo "backend-tests: ${BACKEND_RESULT}"
          echo "frontend-tests: ${FRONTEND_RESULT}"
          echo "repo-checks: ${REPO_RESULT}"

          for result in "${DETECT_CHANGES_RESULT}" "${BACKEND_RESULT}" "${FRONTEND_RESULT}" "${REPO_RESULT}"; do
            if [ "${result}" = "failure" ] || [ "${result}" = "cancelled" ]; then
              echo "Detected failing required CI dependency."
              exit 1
            fi
          done

      - name: Skip CI checks (non-code/docs-only changes)
        if: needs.detect_changes.outputs.run_backend_tests != 'true' && needs.detect_changes.outputs.run_frontend_tests != 'true' && needs.detect_changes.outputs.run_repo_checks != 'true'
        run: |
          echo "No CI-relevant files changed. Skipping backend/frontend tests and repository checks."
