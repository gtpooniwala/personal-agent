name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref_name }}
  cancel-in-progress: true

jobs:
  tests-and-repo-checks:
    name: tests-and-repo-checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Detect CI-relevant changes
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run_checks=true" >> "$GITHUB_OUTPUT"
            echo "run_frontend_checks=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git fetch origin "${{ github.base_ref }}"
          CHANGED="$(git diff --name-only "origin/${{ github.base_ref }}...HEAD")"
          echo "$CHANGED"
          if echo "$CHANGED" | grep -E '^(backend/|frontend/|tests/|scripts/|\.githooks/|Dockerfile|docker-compose\.yml|setup\.sh|start_server\.sh|\.github/workflows/|backend/requirements\.txt)'; then
            echo "run_checks=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_checks=false" >> "$GITHUB_OUTPUT"
          fi
          if echo "$CHANGED" | grep -E '^frontend/'; then
            echo "run_frontend_checks=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_frontend_checks=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.changes.outputs.run_checks == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Setup Node
        if: steps.changes.outputs.run_frontend_checks == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        if: steps.changes.outputs.run_frontend_checks == 'true'
        run: |
          cd frontend
          npm ci

      - name: Run frontend checks
        if: steps.changes.outputs.run_frontend_checks == 'true'
        run: |
          cd frontend
          npm run lint
          npm run test
          npm run build

      - name: Run unit tests
        if: steps.changes.outputs.run_checks == 'true'
        run: |
          python -m unittest discover -s tests -p "test_*.py" -v

      - name: Run deterministic repository checks
        if: steps.changes.outputs.run_checks == 'true'
        run: |
          python tests/run_repo_checks.py

      - name: Skip CI checks (non-code/docs-only changes)
        if: steps.changes.outputs.run_checks != 'true'
        run: |
          echo "No CI-relevant files changed. Skipping tests and repository checks."
