name: Feature request
description: Propose a new user-facing or system capability
title: "feat: "
labels:
  - feature request
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What capability should be added?
      placeholder: Add a concise summary of the proposed feature.
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or system problem does this solve?
      placeholder: Describe the need, pain point, or missing behavior.
    validations:
      required: true

  - type: textarea
    id: proposed_behavior
    attributes:
      label: Proposed behavior
      description: Describe the expected behavior or user outcome.
      placeholder: Explain the intended scope without turning this into an implementation dump.
    validations:
      required: true

  - type: dropdown
    id: primary_type
    attributes:
      label: Primary type label
      options:
        - type:architecture
        - type:security
        - type:cleanup
        - type:improvement
        - type:ops
    validations:
      required: true

  - type: checkboxes
    id: additional_types
    attributes:
      label: Additional type labels
      description: Optional. Select only if the issue clearly spans another concern.
      options:
        - label: type:architecture
        - label: type:security
        - label: type:cleanup
        - label: type:improvement
        - label: type:ops

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - priority:p0
        - priority:p1
        - priority:p2
        - priority:p3
    validations:
      required: true

  - type: dropdown
    id: size
    attributes:
      label: Size
      options:
        - size:S
        - size:M
        - size:L
    validations:
      required: true

  - type: checkboxes
    id: tracks
    attributes:
      label: Track labels
      description: Select only for durable multi-issue initiatives.
      options:
        - label: track:migration

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: What would make this issue done?
      placeholder: Use bullet points for clear, testable completion criteria.
    validations:
      required: true

  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies
      description: Optional. List related issues, blockers, or sequencing notes.
      placeholder: Refs #123, blocked by #456, or "none".
