name: Engineering task
description: Refactor, architecture follow-up, ops work, or other internal engineering task
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is the engineering task?
      placeholder: Describe the task in one concise paragraph.
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: What code, behavior, or planning context makes this work necessary?
      placeholder: Describe the current state and why this work exists.
    validations:
      required: true

  - type: textarea
    id: proposed_scope
    attributes:
      label: Proposed scope
      description: What should this issue cover, and what is intentionally out of scope?
      placeholder: Be concrete about the intended slice.
    validations:
      required: true

  - type: dropdown
    id: primary_type
    attributes:
      label: Primary type label
      options:
        - type:architecture
        - type:security
        - type:cleanup
        - type:improvement
        - type:ops
    validations:
      required: true

  - type: checkboxes
    id: additional_types
    attributes:
      label: Additional type labels
      description: Optional. Select only if the issue clearly spans another concern.
      options:
        - label: type:architecture
        - label: type:security
        - label: type:cleanup
        - label: type:improvement
        - label: type:ops

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - priority:p0
        - priority:p1
        - priority:p2
        - priority:p3
    validations:
      required: true

  - type: dropdown
    id: size
    attributes:
      label: Size
      options:
        - size:S
        - size:M
        - size:L
    validations:
      required: true

  - type: checkboxes
    id: tracks
    attributes:
      label: Track labels
      description: Select only for durable multi-issue initiatives.
      options:
        - label: track:migration

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: What would make this issue done, or what decision output should exist?
      placeholder: Use bullet points for clear completion criteria.
    validations:
      required: true

  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies
      description: Optional. List related issues, blockers, or sequencing notes.
      placeholder: Refs #123, blocked by #456, or "none".
