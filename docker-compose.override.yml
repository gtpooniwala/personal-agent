services:
  personal-agent:
    command:
      [
        "uvicorn",
        "backend.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--reload",
        "--reload-dir",
        "/app/backend",
      ]
    environment:
      ENVIRONMENT: local
    volumes:
      - ./backend:/app/backend
      - ./data:/app/data
      - ./logs:/app/logs

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
      args:
        NEXT_PUBLIC_API_BASE_URL: ${DOCKER_NEXT_PUBLIC_API_BASE_URL:-http://localhost:${DOCKER_API_PORT:-8001}/api/v1}
    environment:
      NODE_ENV: development
      WATCHPACK_POLLING: "true"
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_API_BASE_URL: ${DOCKER_NEXT_PUBLIC_API_BASE_URL:-http://localhost:${DOCKER_API_PORT:-8001}/api/v1}
      NEXT_PUBLIC_RUNTIME_API_BASE_URL: ${DOCKER_NEXT_PUBLIC_RUNTIME_API_BASE_URL:-http://localhost:${DOCKER_API_PORT:-8001}}
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next

volumes:
  frontend_node_modules:
  frontend_next:
