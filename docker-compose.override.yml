services:
  personal-agent:
    command:
      [
        "sh",
        "-lc",
        "uvicorn backend.main:app --host 0.0.0.0 --port $${PORT} --reload --reload-dir /app/backend",
      ]
    environment:
      ENVIRONMENT: local
    volumes:
      - ./backend:/app/backend
      - ./data:/app/data
      - ./logs:/app/logs

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    environment:
      NODE_ENV: development
      WATCHPACK_POLLING: "true"
      NEXT_TELEMETRY_DISABLED: "1"
      API_BASE_URL: ${DOCKER_API_BASE_URL:-http://personal-agent:${DOCKER_API_PORT:-8001}}
      AGENT_API_KEY: ${AGENT_API_KEY:-local-dev-proxy-token}
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next

volumes:
  frontend_node_modules:
  frontend_next:
